<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ブラウザのタブに表示されるタイトル -->
<title>UEC-Optica Photo Rally 研究室マップ</title>

<style>
  /* ============================================================
     色の定義（ここを変えるとサイト全体の配色が変わります）
     ============================================================ */
  :root {
    --teal: #60B5AE;        /* メインのティール色（タブ・モーダルなど） */
    --teal-dark: #336F6B;   /* 濃いティール（見出し・建物マーカー） */
    --green-dark: #00642D;  /* ラベルのデフォルト枠色 */
    --bg: #FDFFF3;          /* ページ背景色 */
    --marker-bg: #FAFFE7;   /* 部屋番号（丸）の背景色 */
  }

  * { box-sizing: border-box; }

  /* --- ページ全体 --- */
  body {
    margin: 0;
    padding: 16px;
    background: var(--bg);
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    color: #333;
  }

  /* --- ページ上部の説明文エリア --- */
  header {
    max-width: 900px;
    margin: 0 auto 16px;
    text-align: center;
  }

  header h1 {
    margin: 0 0 4px;
    font-size: 1.5rem;       /* 大見出しのサイズ */
    color: var(--teal-dark);
  }

  header p {
    margin: 0;
    font-size: 0.9rem;       /* 説明文のサイズ */
    color: #555;
  }

  /* --- 東/西キャンパス切り替えタブ --- */
  .campus-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;                /* タブ同士の間隔 */
    max-width: 900px;
    margin: 0 auto 12px;
  }

  .campus-tab {
    padding: 8px 20px;
    border: 2px solid var(--teal);
    border-radius: 20px;
    background: #fff;
    color: var(--teal-dark);
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .campus-tab:hover {
    background: var(--teal);
    color: #fff;
  }

  /* 選択中のタブ */
  .campus-tab.active {
    background: var(--teal);
    color: #fff;
  }

  /* --- マップ表示エリア（東/西共通） --- */
  .map-section {
    display: none;           /* 非表示がデフォルト */
    max-width: 900px;
    margin: 0 auto;
  }

  .map-section.active {
    display: block;          /* タブ選択時に表示 */
  }

  /* 東キャンパス用コンテナ */
  #map-container-east {
    position: relative;      /* ラベル・折れ線の基準位置 */
    width: 100%;
    max-width: 820px;        /* マップ全体の最大幅 */
    margin: 0 auto;
    padding-bottom: 24px;    /* 下側ラベル用の余白 */
  }

  /* 西キャンパス用コンテナ */
  #map-container-west {
    position: relative;
    width: 100%;
    max-width: 900px;
    margin: 0 auto;
    padding-bottom: 24px;
  }

  /* マップ画像を包む枠（重ね順: 1 = 最背面） */
  .campus-map-inner {
    position: relative;
    z-index: 1;
  }

  /* 東: 左側にラベル一覧を置くため、マップを右にずらす */
  .east-map-inner {
    margin-left: 34%;        /* ← 左の余白幅（%）。ラベルが入るスペース */
  }

  /* 西: 左右両方にラベルを置くため、マップを中央に寄せる */
  .west-map-inner {
    margin-left: 30%;        /* ← 左の余白幅（%） */
    margin-right: 26%;       /* ← 右の余白幅（%） */
  }

  .campus-map-inner .map-image {
    width: 100%;
    height: auto;
    display: block;
  }

  /* 折れ線 SVG（重ね順: 2 = 地図より前面） */
  .leader-svg {
    position: absolute;
    inset: 0;                /* コンテナ全体を覆う */
    width: 100%;
    height: 100%;
    pointer-events: none;    /* クリックは下のラベルに通す */
    overflow: visible;
    z-index: 2;
  }

  .leader-svg line {
    stroke: #606060;         /* 折れ線の色 */
    stroke-width: 2;           /* 折れ線の太さ */
    vector-effect: non-scaling-stroke;
  }

  /* 研究室ラベル一覧（重ね順: 3 = 最前面） */
  .labels-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 3;
  }

  .labels-layer .map-label {
    pointer-events: auto;    /* ラベルだけクリック可能にする */
  }

  .map-image {
    width: 100%;
    height: auto;
    display: block;
  }

  /* --- 研究室ラベル（丸 + 名前） --- */
  .map-label {
    position: absolute;
    display: flex;
    align-items: center;
    gap: 0;
    cursor: pointer;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.25));
    transition: transform 0.15s ease;
    white-space: nowrap;
    z-index: 5;
    transform: translate(0, -50%);  /* labelY をラベルの縦中央に合わせる */
  }

  .map-label:hover {
    transform: translate(0, -50%) scale(1.04);
    z-index: 10;
  }

  /* 部屋番号（左側の丸） */
  .marker-room,
  .map-label .marker-room {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--marker-bg);
    border: 2px solid var(--marker-color, var(--green-dark));
    font-size: 16px;         /* 部屋番号の文字サイズ */
    font-weight: bold;
    color: var(--marker-color, var(--green-dark));
    flex-shrink: 0;
  }

  /* 研究室名（右側の色付きラベル） */
  .marker-name,
  .map-label .marker-name {
    background: var(--marker-color, var(--green-dark));
    color: #fff;
    padding: 6px 11px;
    border-radius: 0 18px 18px 0;
    font-size: 17px;         /* 研究室名の文字サイズ */
    font-weight: bold;
    margin-left: -4px;
  }

  /* 景品抽選所専用スタイル（isPrize: true の項目） */
  .map-label.prize .marker-room {
    border-color: #C9A000;
    color: #8A6D00;
    background: #FEF8D6;
  }

  .map-label.prize .marker-name {
    background: #FCE15A;
    color: #333;
    border: 2px solid #C9A000;
    border-left: none;
  }

  /* --- クリック時の詳細ポップアップ（モーダル） --- */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-content {
    background: #fff;
    padding: 24px;
    border-radius: 8px;
    width: 100%;
    max-width: 420px;
    position: relative;
    border-top: 4px solid var(--teal);
  }

  .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 24px;
    cursor: pointer;
    color: #666;
    line-height: 1;
  }

  .close-btn:hover { color: #000; }

  .lab-title {
    margin: 0 0 4px;
    color: var(--teal-dark);
    font-size: 20px;
  }

  .lab-room {
    font-size: 14px;
    color: #555;
    margin-bottom: 10px;
  }

  .lab-desc {
    font-size: 14px;
    line-height: 1.6;
    color: #333;
    margin: 0;
  }

  .lab-campus {
    display: inline-block;
    font-size: 11px;
    background: var(--teal);
    color: #fff;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 8px;
  }
</style>
</head>

     ページ上部テキスト（自由に編集できます）
     ============================================================ -->

<!-- 研究室クリック時の詳細ポップアップ -->
<div id="modal-overlay" onclick="closeModal(event)">

<script>

     【編集ガイド】このファイルの主な編集箇所

    { building: "bld6", name: "沈 研", room: "東6号館 506", desc: "低次元量子ドットを用いた太陽電池・LEDの開発・機構解明", color: "#156082", roomLabel: "506", labelX: 2, labelY: 34 },
    { building: "bld6", name: "奥野 研", room: "東6号館 401", desc: "新規蛍光体材料、ナノ光材料開拓、半導体微細構造", color: "#00642D", roomLabel: "401", labelX: 2, labelY: 48 },
    { building: "bld6", name: "清水 研", room: "東6号館 416", desc: "光子を操り、光情報通信技術・光計測技術への応用", color: "#E07B39", roomLabel: "416", labelX: 2, labelY: 56 },
    { building: "bld6", name: "美濃島・浅原・加藤 研", room: "東6号館 314", desc: "「光シンセサイザー」を活用した時間・空間・周波数特性に関する研究", color: "#7B3F9E", roomLabel: "314", labelX: 2, labelY: 64 },
    { building: "bld6", name: "景品抽選所", room: "東6号館 429", desc: "Photo Rally の景品抽選会場。西・東キャンパスでそれぞれ1枚以上撮影してね！", color: "#C9A000", roomLabel: "429", labelX: 2, labelY: 72, isPrize: true },
    // --- 東9号館（右上） ---
    { building: "bld9", name: "渡邉 研", room: "東9号館 107", desc: "光とAI技術の融合", color: "#7B3F9E", roomLabel: "107", labelX: 72, labelY: 8 },
    // --- 東3号館 = 地図上の図書館（下） ---
    { building: "bld3", name: "酒井 研", room: "東3号館 10F", desc: "電波天文、星形成、超電導検出器", color: "#336F6B", roomLabel: "10F", labelX: 38, labelY: 88 },
  ];

  /* ----------------------------------------------------------
     西キャンパス: 建物アンカー（意味・調整方法は eastBuildings と同じ）
     ---------------------------------------------------------- */
  const westBuildings = {
    bld7: { name: "西7号館", mapX: 40, mapY: 28 },

  /* ----------------------------------------------------------
     西キャンパス: 研究室データ（形式は eastLabData と同じ）
     labelX が小さい → 左側の一覧、大きい（例: 74）→ 右側の一覧
     ---------------------------------------------------------- */
  const westLabData = [

    { building: "bld2", name: "庄司 研", room: "西2号館 309", desc: "レーザーでナノを作って、見て、触って、動かす", color: "#7B3F9E", roomLabel: "309", labelX: 74, labelY: 42 },
    { building: "bld2", name: "中村 研", room: "西2号館 325", desc: "計算機シミュレーションを用いた原子レベル物質設計", color: "#156082", roomLabel: "325", labelX: 74, labelY: 50 },
    { building: "bld2", name: "坂野 研", room: "西2号館 409", desc: "ナノトライボロジー、物性理論、計算物質科学", color: "#336F6B", roomLabel: "409", labelX: 74, labelY: 58 },
    // --- 各建物1件ずつ（L字の折れ線） ---
    { building: "bld1", name: "一色 研", room: "西1号館 213", desc: "光集積回路、光コンピューティング、光増幅、光電融合", color: "#156082", roomLabel: "213", labelX: 74, labelY: 22 },
    { building: "bld4", name: "丹治 研", room: "西4号館 413", desc: "光と原子の量子状態制御を基盤とした量子技術の創出", color: "#336F6B", roomLabel: "413", labelX: 2, labelY: 64 },
    { building: "bld3", name: "戸倉川 研", room: "西3号館 114", desc: "光の特性を生かした新奇レーザー装置の開発とその応用", color: "#E07B39", roomLabel: "114", labelX: 2, labelY: 72 },
    { building: "bld8", name: "岩國 研", room: "西8号館 513", desc: "レーザーで見る分子の世界 精密分子分光実験", color: "#00642D", roomLabel: "513", labelX: 74, labelY: 68 },
    { building: "bld9", name: "武者 研", room: "西9号館 613", desc: "極限まできれいな光をもとめて", color: "#00642D", roomLabel: "613", labelX: 74, labelY: 76 },
  ];

  /* モーダルに表示するキャンパス名 */
  const campusLabels = { east: "東キャンパス", west: "西キャンパス" };

  /* ============================================================
     以下は基本的に編集不要（仕組みの説明用コメント付き）
     ============================================================ */

  /** labData の1件から、画面上のラベル DOM 要素を作る */
  function createLabelChip(lab, campus) {
    const el = document.createElement('div');
    el.className = 'map-label' + (lab.isPrize ? ' prize' : '');
    el.style.left = lab.labelX + '%';   // ラベルの横位置
    el.style.top = lab.labelY + '%';    // ラベルの縦位置
    el.style.setProperty('--marker-color', lab.color); // CSS 変数で色を渡す
    el.dataset.campus = campus;
    el.dataset.name = lab.name;         // 折れ線描画時に labData と紐付ける

    const room = document.createElement('span');
    room.className = 'marker-room';
    room.textContent = lab.roomLabel;

    const name = document.createElement('span');
    name.className = 'marker-name';
    name.textContent = lab.name;

    el.appendChild(room);
    el.appendChild(name);
    el.onclick = () => openModal({ ...lab, campus });
    return el;
  }

  /** コンテナとマップ画像の画面上の位置・サイズ（px）を取得 */
  function getMapRect(container, innerSelector) {
    const mapInner = container.querySelector(innerSelector);
    const cRect = container.getBoundingClientRect();
    const mRect = mapInner.getBoundingClientRect();
    return { container: cRect, map: mRect };
  }

  /** マップ画像内の % 座標 → コンテナ内の px 座標に変換 */
  function mapToContainerPx(mapX, mapY, layout) {
    const x = layout.map.left + (mapX / 100) * layout.map.width;
    const y = layout.map.top + (mapY / 100) * layout.map.height;
    return { x: x - layout.container.left, y: y - layout.container.top };
  }

  /** SVG に直線1本を追加 */
  function addSvgLine(svg, x1, y1, x2, y2) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    svg.appendChild(line);
  }

  /** ラベル要素の位置情報（px）を取得 */
  function getLabelMetrics(labelEl, cRect) {
    const r = labelEl.getBoundingClientRect();
    return {
      left: r.left - cRect.left,
      right: r.right - cRect.left,
      midY: r.top + r.height / 2 - cRect.top,
    };
  }

  /**
   * 同一建物に複数ラベルがある場合の折れ線（バス型）
   * ラベル → 短い水平線 → 縦幹1本 → 建物へ水平線1本
   * gap: 縦幹とラベル右端の間隔（px）。通常は変更不要。
   */
  function drawBusConnector(svg, items, anchor, gap) {
    const isLeft = items[0].right < anchor.x; // ラベルが建物より左側にあるか
    const busX = isLeft
      ? Math.max(...items.map(i => i.right)) + gap  // 左側ラベル: 縦幹はラベルの右
      : Math.min(...items.map(i => i.left)) - gap;  // 右側ラベル: 縦幹はラベルの左

    const midYs = items.map(i => i.midY);
    const trunkTop = Math.min(...midYs, anchor.y);
    const trunkBottom = Math.max(...midYs, anchor.y);

    addSvgLine(svg, busX, trunkTop, busX, trunkBottom);           // 縦幹
    items.forEach(i => {
      const fromX = isLeft ? i.right : i.left;
      addSvgLine(svg, fromX, i.midY, busX, i.midY);               // 各ラベル → 縦幹
    });
    addSvgLine(svg, busX, anchor.y, anchor.x, anchor.y);          // 縦幹 → 建物
  }

  /**
   * 同一建物にラベルが1件だけの場合の折れ線（L字、折れ1回まで）
   */
  function drawSimpleConnector(svg, item, anchor) {
    const isLeft = item.right < anchor.x;
    const edgeX = isLeft ? item.right : item.left;

    // ラベルと建物がほぼ同じ高さ → 直線1本
    if (Math.abs(item.midY - anchor.y) < 4) {
      addSvgLine(svg, edgeX, item.midY, anchor.x, anchor.y);
      return;
    }
    // ラベルと建物がほぼ同じ横位置 → 直線1本
    if (Math.abs(edgeX - anchor.x) < 4) {
      addSvgLine(svg, anchor.x, anchor.y, edgeX, item.midY);
      return;
    }
    // L字: 建物から縦 → ラベルへ横
    addSvgLine(svg, anchor.x, anchor.y, anchor.x, item.midY);
    addSvgLine(svg, anchor.x, item.midY, edgeX, item.midY);
  }

  /** 建物ごとにラベルをグループ化し、折れ線と建物マーカー（●）を描画 */
  function drawLeaderLines(container, svg, labData, buildings, innerSelector) {
    const labels = container.querySelectorAll('.map-label');
    const layout = getMapRect(container, innerSelector);

    if (!layout.container.width) return;

    svg.setAttribute('viewBox', `0 0 ${layout.container.width} ${layout.container.height}`);
    svg.innerHTML = '';

    const cRect = layout.container;
    const groups = {};

    // building キーごとにラベルをまとめる
    labels.forEach(labelEl => {
      const lab = labData.find(l => l.name === labelEl.dataset.name);
      if (!lab) return;
      if (!groups[lab.building]) groups[lab.building] = [];
      groups[lab.building].push(getLabelMetrics(labelEl, cRect));
    });

    // 建物ごとに折れ線を描く
    Object.entries(groups).forEach(([buildingKey, items]) => {
      const bld = buildings[buildingKey];
      const anchor = mapToContainerPx(bld.mapX, bld.mapY, layout);

      // 建物位置の丸マーカー
      const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', anchor.x);
      circle.setAttribute('cy', anchor.y);
      circle.setAttribute('r', 5);
      circle.setAttribute('fill', '#336F6B');
      circle.setAttribute('stroke', '#fff');
      circle.setAttribute('stroke-width', 2);
      svg.appendChild(circle);

      // 2件以上 → バス型 / 1件 → L字
      if (items.length >= 2) {
        drawBusConnector(svg, items, anchor, 10);
      } else {
        drawSimpleConnector(svg, items[0], anchor);
      }
    });
  }

  function drawEastLeaderLines() {
    drawLeaderLines(
      document.getElementById('map-container-east'),
      document.getElementById('leader-lines-east'),
      eastLabData,
      eastBuildings,
      '.east-map-inner'
    );
  }

  function drawWestLeaderLines() {
    drawLeaderLines(
      document.getElementById('map-container-west'),
      document.getElementById('leader-lines-west'),
      westLabData,
      westBuildings,
      '.west-map-inner'
    );
  }

  /** ラベルを生成してから折れ線を描画 */
  function renderCampusMap(labelsId, labData, campus, drawFn) {
    const labelsLayer = document.getElementById(labelsId);
    labelsLayer.innerHTML = '';
    labData.forEach(lab => {
      labelsLayer.appendChild(createLabelChip(lab, campus));
    });
    requestAnimationFrame(drawFn); // ラベル配置後に折れ線を計算
  }

  function renderEastMap() {
    renderCampusMap('labels-east', eastLabData, 'east', drawEastLeaderLines);
  }

  function renderWestMap() {
    renderCampusMap('labels-west', westLabData, 'west', drawWestLeaderLines);
  }

  /** ラベルクリック時: モーダルに研究室情報を表示 */
  function openModal(lab) {
    document.getElementById('modal-campus').textContent = campusLabels[lab.campus];
    document.getElementById('modal-title').textContent = lab.name;
    document.getElementById('modal-room').textContent = '場所: ' + lab.room;
    document.getElementById('modal-desc').textContent = lab.desc;
    document.getElementById('modal-overlay').style.display = 'flex';
  }

  /** モーダルを閉じる（×ボタン or 背景クリック） */
  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  /* タブ切り替え */
  document.querySelectorAll('.campus-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const campus = tab.dataset.campus;
      document.querySelectorAll('.campus-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.map-section').forEach(s => s.classList.remove('active'));
      document.getElementById('map-section-' + campus).classList.add('active');
      // 表示切替後に折れ線を再計算（非表示の間はサイズが 0 になるため）
      if (campus === 'east') requestAnimationFrame(drawEastLeaderLines);
      if (campus === 'west') requestAnimationFrame(drawWestLeaderLines);
    });
  });

  /* ウィンドウサイズ変更時に折れ線を再描画 */
  window.addEventListener('resize', () => {
    if (document.getElementById('map-section-east').classList.contains('active')) {
      drawEastLeaderLines();
    }
    if (document.getElementById('map-section-west').classList.contains('active')) {
      drawWestLeaderLines();
    }
  });

  /* マップ画像の読み込み完了後に折れ線を描画 */
  document.getElementById('east-map-image').addEventListener('load', drawEastLeaderLines);
  document.getElementById('west-map-image').addEventListener('load', drawWestLeaderLines);

  /* ページ読み込み時に両キャンパスのマップを初期化 */
  renderEastMap();
  renderWestMap();
</script>

</body>
</html>
