<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学キャンパスマップ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* 画面いっぱいに地図を表示する設定 */
        html, body, #map { margin: 0; padding: 0; width: 100%; height: 100%; }
        .popup-img { width: 100%; max-width: 200px; height: auto; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 地図の初期化（大学の「緯度・経度」と「ズームレベル」を指定）
        const map = L.map('map').setView([35.658639, 139.544361], 17);

        // 2. OpenStreetMapの地図タイルを表示
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 3. 研究室のデータ（位置情報、紹介文、画像URL）
        const labs = [
            {
                name: "渡邉恵理子 研究室",
                lat: 35.658639, 
                lng: 139.544361,
                desc: "光技術を核として、画像処理技術、情報・IT技術などを融合した、新しい計測システムや情報処理システムに関する研究開発",
                img: "https://github.com/KazukiYamakoshi/uec_optica_research-map/blob/main/labs/eriko_watanabe.jpg" // 画像のURL
            },
            {
                name: "美濃島薫　研究室",
                lat: 35.65811553285512, 
                lng: 139.544335861327,
                desc: "光を自由自在に操作する「知的光シンセサイザ」の研究を行い、多次元情報の超精密計測・制御技術の高度実現を目指します！",
                img: "https://github.com/KazukiYamakoshi/uec_optica_research-map/blob/main/labs/kaoru_minoshima.jpg"
            }
        ];

        // 4. データをループ処理して地図上にピンを配置
        labs.forEach(lab => {
            const marker = L.marker([lab.lat, lab.lng]).addTo(map);
            
            // ピンをクリックしたときのポップアップ内容（HTMLで記述可能）
            const popupContent = `
                <h3>${lab.name}</h3>
                <p>${lab.desc}</p>
                <img src="${lab.img}" class="popup-img" alt="${lab.name}">
            `;
            
            marker.bindPopup(popupContent);
        });
    </script>
</body>
</html>
